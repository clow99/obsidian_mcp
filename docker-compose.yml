services:
  obsidian-mcp:
    build:
      context: .
    image: obsidian-mcp:local
    tty: false
    env_file:
      - .env
    environment:
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-3000}
    ports:
      - "${MCP_HTTP_PORT:-3000}:${MCP_HTTP_PORT:-3000}"
    volumes:
      - ${OBSIDIAN_VAULT_HOST_PATH:-./sample-vault}:${OBSIDIAN_VAULT_PATH:-/vault}
    command: ["node", "dist/http-server.js"]
